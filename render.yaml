services:
  - type: web
    name: faq-chatbot-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        fromDatabase:
          name: faq-chatbot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: JWT_ALGORITHM
        value: HS256
      - key: BOOTSTRAP_ADMIN_USERNAME
        value: admin
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_CHAT_MODEL
        value: gpt-4o-mini
      - key: OPENAI_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: MPOnline FAQ Chatbot
      - key: SMTP_USE_TLS
        value: "false"
      - key: SMTP_USE_SSL
        value: "true"
      - key: VECTOR_STORE_PATH
        value: /opt/render/project/src/app/storage/faiss.index
      - key: VECTOR_METADATA_PATH
        value: /opt/render/project/src/app/storage/faiss_metadata.json
      - key: UPLOAD_DIR
        value: /opt/render/project/src/app/storage/uploads
      - key: TOP_K_CHUNKS
        value: "4"
      - key: MIN_SIMILARITY_SCORE
        value: "0.45"
      - key: MAX_CHUNK_WORDS
        value: "180"
      - key: CHUNK_OVERLAP_WORDS
        value: "40"
      - key: MAX_CONTEXT_CHARACTERS
        value: "8000"
      - key: ALLOWED_ORIGINS
        value: '["https://your-frontend-domain.vercel.app"]'

databases:
  - name: faq-chatbot-db
    plan: free
    databaseName: faq_chatbot
    user: faq_chatbot
